name: Test HTML Content

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-on-version: '20'

    - name: Install HTML Linter
      run: npm install -g htmlhint

    - name: Run HTML Validation Test
      run: htmlhint index.html
